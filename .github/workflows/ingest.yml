name: Ingest Content

on:
  schedule:
    - cron: "0 2,8,14,20 * * *"
  workflow_dispatch:

concurrency:
  group: content-pipeline
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
      LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
      LLM_API_KEY: ${{ vars.LLM_API_KEY }}
      LLM_MODEL: ${{ vars.LLM_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ingest
        run: npm run ingest:follow-builders

      - name: Drain summaries after ingest
        run: npm run summaries:drain -- --limit=20 --max-batches=4

      - name: Generate daily summaries
        run: npm run daily-summaries:run
